<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hebbian Learning Demo</title>
    <link rel="stylesheet" href="/src/style.css" />
  </head>
  <body>
    <div class="app">
      <header>
        <h1>Hebbian Learning</h1>
        <p class="subtitle">Neurons that fire together, wire together.</p>
      </header>

      <canvas id="canvas"></canvas>

      <div class="stats">
        <div class="stat"><span id="s-fires">0</span><label>Total fires</label></div>
        <div class="stat"><span id="s-coinc">0</span><label>Co-firings</label></div>
        <div class="stat"><span id="s-maxw">0.00</span><label>Strongest weight</label></div>
      </div>

      <div class="controls">
        <div class="control">
          <label>Random fire rate</label>
          <input type="range" id="r-rate" min="1" max="20" value="6" step="1" />
          <span id="o-rate">6</span>
        </div>
        <div class="control">
          <label>Learning rate η</label>
          <input type="range" id="r-eta" min="1" max="20" value="5" step="1" />
          <span id="o-eta">0.05</span>
        </div>
        <div class="control">
          <label>Weight decay</label>
          <input type="range" id="r-decay" min="0" max="10" value="2" step="1" />
          <span id="o-decay">0.002</span>
        </div>
      </div>

      <div class="buttons">
        <button id="btn-reset">Reset weights</button>
        <button id="btn-fire">Fire all neurons</button>
      </div>
    </div>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
